name: Review Gate

on:
  pull_request_target:
    branches: [main, master]
    types: [opened, reopened, synchronize, ready_for_review]
  pull_request_review:
    types: [submitted, dismissed]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  gate:
    if: >-
      (github.event_name == 'pull_request_target' && (github.event.pull_request.base.ref == 'main' || github.event.pull_request.base.ref == 'master')) ||
      (github.event_name == 'pull_request_review' && (github.event.pull_request.base.ref == 'main' || github.event.pull_request.base.ref == 'master'))
    uses: active-ailab/skills-manifest/.github/workflows/reusable-pr-review-gate.yml@main
    with:
      merge_method: merge
    secrets:
      FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
      FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
