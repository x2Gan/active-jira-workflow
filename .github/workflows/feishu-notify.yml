name: Feishu Template Notify

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Build payload
        env:
          TEMPLATE_ID: AAqtmKDOFxVxs
          TEMPLATE_VERSION: 1.0.8
          FEISHU_BOT_SECRET: ${{ secrets.FEISHU_BOT_SECRET }}
          REPO_NAME: ${{ github.event.repository.name }}
          REPO_URL: ${{ github.event.repository.html_url }}
          ACTOR: ${{ github.actor }}
          BRANCH: ${{ github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          python3 - <<'PY' > payload.json
          import base64
          import hashlib
          import hmac
          import json
          import os
          import time
          from datetime import datetime

          now = datetime.now().strftime("%Y-%m-%d %H:%M:%S")
          msg = os.getenv("COMMIT_MSG", "").strip()
          if not msg:
              msg = f"{os.environ['EVENT_NAME']} triggered by {os.environ['ACTOR']}"

          payload = {
              "msg_type": "interactive",
              "card": {
                  "type": "template",
                  "data": {
                      "template_id": os.environ["TEMPLATE_ID"],
                      "template_version_name": os.environ["TEMPLATE_VERSION"],
                      "template_variable": {
                          "update_text": "提交更新",
                          "repo_name": os.environ["REPO_NAME"],
                          "updated_at": now,
                          "actor_name": os.environ["ACTOR"],
                          "ref_branch": os.environ["BRANCH"],
                          "message_title": "更新内容",
                          "message_body": msg,
                          "ref_name": {
                            "url": os.environ["REPO_URL"],
                            "pc_url": os.environ["REPO_URL"],
                            "ios_url": os.environ["REPO_URL"],
                            "android_url": os.environ["REPO_URL"]
                          }
                      }
                  }
              }
          }

          secret = os.getenv("FEISHU_BOT_SECRET", "")
          if secret:
              timestamp = str(int(time.time()))
              string_to_sign = f"{timestamp}\n{secret}"
              sign = base64.b64encode(
                  hmac.new(
                      string_to_sign.encode("utf-8"),
                      digestmod=hashlib.sha256
                  ).digest()
              ).decode("utf-8")
              payload["timestamp"] = timestamp
              payload["sign"] = sign

          print(json.dumps(payload, ensure_ascii=False))
          PY

      - name: Send to Feishu
        env:
          FEISHU_WEBHOOK: https://open.feishu.cn/open-apis/bot/v2/hook/440136c2-8b17-40dd-bd53-2d806baada76
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -d @payload.json \
            "$FEISHU_WEBHOOK"