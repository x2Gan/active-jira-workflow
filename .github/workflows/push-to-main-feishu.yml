# GitHub Actions: Push到main时发送飞书富文本卡片通知
# 当有人推送代码到main分支时，自动发送飞书通知

name: Push to Main - Feishu Notification

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.github/**'

permissions:
  contents: read
  pull-requests: read

jobs:
  notify-feishu:
    runs-on: ubuntu-latest
    steps:
      - name: 获取提交信息
        id: commit-info
        uses: actions/github-script@v7
        with:
          script: |
            const push = context.payload;
            const commit = push.head_commit;
            const repo = push.repository;
            
            // 获取变更文件列表
            const compareUrl = `https://github.com/${repo.full_name}/compare/${push.before}...${push.after}`;
            
            return {
              repo_name: repo.full_name,
              repo_url: repo.html_url,
              commit_id: commit.id.substring(0, 7),
              commit_message: commit.message.split('\n')[0],
              commit_author: commit.author.name,
              commit_url: commit.url,
              compare_url: compareUrl,
              timestamp: new Date().toISOString(),
              files_changed: commit.added.length + commit.modified.length + commit.removed.length,
              additions: commit.added.length,
              modifications: commit.modified.length,
              deletions: commit.removed.length
            };

      - name: 发送飞书富文本卡片
        run: |
          COMMIT_ID="${{ steps.commit-info.outputs.commit_id }}"
          COMMIT_MSG="${{ steps.commit-info.outputs.commit_message }}"
          COMMIT_AUTHOR="${{ steps.commit-info.outputs.commit_author }}"
          COMMIT_URL="${{ steps.commit-info.outputs.commit_url }}"
          REPO_NAME="${{ steps.commit-info.outputs.repo_name }}"
          REPO_URL="${{ steps.commit-info.outputs.repo_url }}"
          COMPARE_URL="${{ steps.commit-info.outputs.compare_url }}"
          FILES_CHANGED="${{ steps.commit-info.outputs.files_changed }}"
          ADDITIONS="${{ steps.commit-info.outputs.additions }}"
          DELETIONS="${{ steps.commit-info.outputs.deletions }}"
          TIMESTAMP="${{ steps.commit-info.outputs.timestamp }}"
          
          # 飞书富文本卡片消息
          curl -X POST "${{ secrets.FEISHU_WEBHOOK_URL }}" \
            -H 'Content-Type: application/json' \
            -d '{
              "msg_type": "interactive",
              "card": {
                "config": {
                  "wide_screen_mode": true
                },
                "header": {
                  "title": {
                    "tag": "plain_text",
                    "content": "🔔 代码提交通知 - 需要Review"
                  },
                  "template": "red"
                },
                "elements": [
                  {
                    "tag": "div",
                    "text": {
                      "tag": "lark_md",
                      "content": "**仓库:** ["${REPO_NAME}"]("${REPO_URL}")\n**提交者:** "${COMMIT_AUTHOR}"\n**时间:** "${TIMESTAMP}""
                    }
                  },
                  {
                    "tag": "hr"
                  },
                  {
                    "tag": "div",
                    "text": {
                      "tag": "lark_md",
                      "content": "**提交信息:**\n```\n"${COMMIT_MSG}"\n```"
                    }
                  },
                  {
                    "tag": "div",
                    "text": {
                      "tag": "lark_md",
                      "content": "**变更统计:**\n- 📝 修改文件: "${FILES_CHANGED}" 个\n- ✅ 新增: "${ADDITIONS}" 个\n- ❌ 删除: "${DELETIONS}" 个"
                    }
                  },
                  {
                    "tag": "hr"
                  },
                  {
                    "tag": "div",
                    "text": {
                      "tag": "lark_md",
                      "content": "**提交ID:** `"${COMMIT_ID}"`"
                    }
                  },
                  {
                    "tag": "action",
                    "actions": [
                      {
                        "tag": "button",
                        "text": {
                          "tag": "plain_text",
                          "content": "查看提交详情"
                        },
                        "url": "${COMMIT_URL}",
                        "type": "primary"
                      },
                      {
                        "tag": "button",
                        "text": {
                          "tag": "plain_text",
                          "content": "查看变更对比"
                        },
                        "url": "${COMPARE_URL}",
                        "type": "default"
                      }
                    ]
                  },
                  {
                    "tag": "note",
                    "elements": [
                      {
                        "tag": "plain_text",
                        "content": "请管理员及时Review代码变更 ✅"
                      }
                    ]
                  }
                ]
              }
            }'

      - name: 发送文本通知（备份）
        if: failure()
        run: |
          COMMIT_MSG="${{ steps.commit-info.outputs.commit_message }}"
          COMMIT_AUTHOR="${{ steps.commit-info.outputs.commit_author }}"
          REPO_NAME="${{ steps.commit-info.outputs.repo_name }}"
          
          curl -X POST "${{ secrets.FEISHU_WEBHOOK_URL }}" \
            -H 'Content-Type: application/json' \
            -d '{
              "msg_type": "text",
              "content": {
                "text": "🔔 代码提交通知\n\n仓库: '"${REPO_NAME}"'\n提交者: '"${COMMIT_AUTHOR}"'\n提交信息: '"${COMMIT_MSG}"'\n\n请及时Review代码变更。"
              }
            }'
